<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operators in JavaScript</title>
    <script>
        let a = 45;
        let b = 2;
        console.log("Operators in JavaScript")
        console.log("a X b = ", a*b)
        console.log("a + b = ", a+b)
        console.log("a - b = ", a-b)
        console.log("a / b = ", a/b)
        console.log("a ** b = ", a**b)
        console.log("a % b = ", a%b)
        a+=2 // This will increment the value of a by 2, so a will become 47
        console.log(a)
    </script>
</head>
<body>
    Operators in JavaScript
</body>
</html>
