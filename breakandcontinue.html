<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break and Continue</title>
    <script>
        for (let index = 0; index < 7; index++) {
            if (index == 3) {
                //  break // The for loop stops forever
                continue  // Skip this iteration of the loop. Stop right here and continue for the next value of index
            }
            console.log(index)

        }
    </script> 
</head>

</body>
