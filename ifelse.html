<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If-Else</title>
    <script>
        console.log("Let's learn about if else")
        let score = 9;

        if(score >= 90) {
            console.log("Grade A")
        }
        else if (score >= 80) {
            console.log("Grade B")
        }
        else if (score >= 70) {
            console.log("Grade C")
        }
        else if (score >= 60) {
            console.log("Grade D")
        }
        else {
            console.log("Grade F")
        }

        let age = 56;

        let isAdult = age > 18 ? true : false; // This is a ternary operator, it is a shorthand for an if-else statement. It checks if the condition (age > 56) is true, if it is true it assigns true to isAdult, otherwise it assigns false to isAdult.
        console.log(isAdult)
    </script>
</head>
<body>
    
</body>
</html>
